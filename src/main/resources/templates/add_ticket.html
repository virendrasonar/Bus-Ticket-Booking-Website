<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Book Bus Ticket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/add_style.css}"/>

</head>
<body>

<div class="form-container">

    <div class="form-header">
        <h2>🚌 Book a Bus Ticket</h2>
        <p>Enter passenger and travel details</p>
    </div>

    <form th:action="@{/tickets/add}" th:object="${ticket}" method="post">

        <div class="form-group">
            <label>Ticket ID</label>
            <input type="number" th:field="*{id}" required/>
        </div>

        <div class="form-group">
            <label>Passenger Name</label>
            <input type="text" th:field="*{passengerName}" required/>
        </div>

        <div class="form-group">
            <label>Bus Number</label>
            <input type="text" th:field="*{busNumber}" required/>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Source</label>
                <input type="text" th:field="*{source}" required/>
            </div>

            <div class="form-group">
                <label>Destination</label>
                <input type="text" th:field="*{destination}" required/>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Date of Travel</label>
                <input type="date" th:field="*{travelDate}" required/>
            </div>

            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" step="0.01" th:field="*{price}" required/>
            </div>
        </div>

        <div class="form-group">
            <label>WhatsApp Number</label>
            <input type="text"
                   th:field="*{whatsappNumber}"
                   pattern="\+91[0-9]{10}"
                   placeholder="+91XXXXXXXXXX"
                   required/>
            <small>Format: +91 followed by 10-digit number</small>
        </div>

        <button type="submit" class="btn">Book Ticket</button>

    </form>

    <div class="back-link">
        <a th:href="@{/}">← Back to Home</a>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Book Bus Ticket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/add_style.css}">
</head>

<body>

<div class="form-wrapper">

    <div class="form-card">

        <div class="form-header">
            <h2>🚌 Book Your Ticket</h2>
        </div>

        <form th:action="@{/tickets/add}" th:object="${ticket}" method="post">

            <div class="form-group">
                <label>Passenger Name</label>
                <input type="text" th:field="*{passengerName}" required>
            </div>

            <div class="form-group">
                <label>Select Bus</label>
                <select name="busId" required>
                    <option value="">-- Select Bus --</option>
                    <option th:each="bus : ${buses}"
                            th:value="${bus.id}"
                            th:text="${bus.busName + ' | ' + bus.source + ' → ' + bus.destination + ' | ₹' + bus.price}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Date of Travel</label>
                <input type="date" th:field="*{travelDate}" required>
            </div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="text"
                       th:field="*{whatsappNumber}"
                       pattern="\+91[0-9]{10}"
                       placeholder="+91XXXXXXXXXX"
                       required>
            </div>

            <button type="submit" class="btn">Book Ticket</button>

        </form>

    </div>

</div>

</body>
</html>

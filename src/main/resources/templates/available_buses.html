<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Available Buses</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/available_style.css}">

</head>
<body>

<div class="container">

    <h2>🚌 Available Buses</h2>

    <table>
        <thead>
            <tr>
                <th>Bus Name</th>
                <th>Route</th>
                <th>Departure</th>
                <th>Arrival</th>
                <th>Duration</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="bus, stat : ${buses}">
                
                <td th:text="${bus.busName}"></td>

                <td th:text="${bus.source + ' → ' + bus.destination}"></td>

                
                <td th:text="${stat.index == 0 ? '06:00 AM' :
                              stat.index == 1 ? '08:30 AM' :
                              stat.index == 2 ? '11:00 AM' : '02:00 PM'}">
                </td>

               
                <td th:text="${stat.index == 0 ? '12:00 PM' :
                              stat.index == 1 ? '02:30 PM' :
                              stat.index == 2 ? '05:00 PM' : '08:00 PM'}">
                </td>

              
                <td th:text="${stat.index == 0 ? '6h 00m' :
                              stat.index == 1 ? '6h 00m' :
                              stat.index == 2 ? '6h 00m' : '6h 00m'}">
                </td>

                <td th:text="'₹' + ${bus.price}"></td>

                <td>
                    <a th:href="@{/tickets/add(busId=${bus.id})}"
                       class="book-btn">Book</a>
                </td>

            </tr>
        </tbody>
    </table>

    <div class="back-link">
        <a th:href="@{/}">← Back to Home</a>
    </div>

</div>

</body>
</html>

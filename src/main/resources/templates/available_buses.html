<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Available Buses</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/available_style.css}">

</head>
<body>

<div class="container">

    <h2>🚌 Available Buses</h2>

    <table>
        <thead>
            <tr>
                <th>Bus Name</th>
                <th>Route</th>
                <th>Departure</th>
                <th>Arrival</th>
                <th>Duration</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="bus : ${buses}">

                <td th:text="${bus.busName}"></td>

                <td th:text="${bus.source + ' → ' + bus.destination}"></td>

                <!-- REAL Departure Time -->
                <td class="dep"
                    th:text="${#temporals.format(bus.departureTime, 'HH:mm')}">
                </td>

                <!-- REAL Arrival Time -->
                <td class="arr"
                    th:text="${#temporals.format(bus.arrivalTime, 'HH:mm')}">
                </td>

                <!-- Duration calculated in JS -->
                <td class="dur"></td>

                <td th:text="'₹' + ${bus.price}"></td>

                <td>
                    <a th:href="@{/tickets/add(busId=${bus.id})}"
                       class="book-btn">Book</a>
                </td>

            </tr>
        </tbody>
    </table>

    <div class="back-link">
        <a th:href="@{/}">← Back to Home</a>
    </div>

</div>

<!-- Duration Calculation Script -->
<script>
document.querySelectorAll("tbody tr").forEach(function(row) {

    const dep = row.querySelector(".dep");
    const arr = row.querySelector(".arr");
    const dur = row.querySelector(".dur");

    if(dep && arr && dur) {

        let depTime = dep.innerText.split(":");
        let arrTime = arr.innerText.split(":");

        let depMinutes = parseInt(depTime[0]) * 60 + parseInt(depTime[1]);
        let arrMinutes = parseInt(arrTime[0]) * 60 + parseInt(arrTime[1]);

        let diff = arrMinutes - depMinutes;

        if(diff < 0) diff += 24 * 60; // handle overnight buses

        let hours = Math.floor(diff / 60);
        let minutes = diff % 60;

        dur.innerText = hours + "h " + minutes + "m";
    }
});
</script>

</body>
</html>

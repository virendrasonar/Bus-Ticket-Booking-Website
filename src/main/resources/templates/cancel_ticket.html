<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cancel Tickets</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/list_style.css}">

</head>
<body>

<div class="container">

    <h2>❌ Cancel Tickets</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Passenger</th>
                <th>Bus</th>
                <th>Route</th>
                <th>Departure</th>
                <th>Arrival</th>
                <th>Date</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="ticket : ${tickets}">

                <td th:text="${ticket.id}"></td>

                <td th:text="${ticket.passengerName}"></td>

                <!-- Bus Name -->
                <td th:text="${ticket.bus != null ? ticket.bus.busName : 'N/A'}"></td>

                <!-- Route -->
                <td th:text="${ticket.bus != null ? ticket.bus.source + ' → ' + ticket.bus.destination : 'N/A'}"></td>

                <!-- Departure -->
                <td th:text="${ticket.bus != null ? #temporals.format(ticket.bus.departureTime, 'hh:mm a') : 'N/A'}"></td>

                <!-- Arrival -->
                <td th:text="${ticket.bus != null ? #temporals.format(ticket.bus.arrivalTime, 'hh:mm a') : 'N/A'}"></td>

                <!-- Travel Date -->
                <td th:text="${ticket.travelDate}"></td>

                <!-- Price -->
                <td th:text="${ticket.bus != null ? '₹' + ticket.bus.price : 'N/A'}"></td>

                <!-- Cancel Button -->
                <td>
                    <form th:action="@{/tickets/cancel/{id}(id=${ticket.id})}" method="post">
                        <button type="submit"
                                class="delete-btn"
                                onclick="return confirm('Are you sure you want to cancel this ticket?')">
                            Cancel
                        </button>
                    </form>
                </td>

            </tr>
        </tbody>
    </table>

    <div class="home-link">
        <a th:href="@{/}">← Back to Home</a>
    </div>

</div>

</body>
</html>

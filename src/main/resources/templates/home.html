<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Bus Ticket Booking System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/home_style.css?v=6}"/>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>

<!-- TOP NAVBAR -->
<nav class="navbar">
  <div class="logo"><i class="fas fa-bus"></i> BusBooking</div>
  <div class="nav-links">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/tickets}">View Tickets</a>
    <a th:href="@{/tickets/search}">Search</a>
  </div>
</nav>

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-overlay">
    <div class="hero-content">
      <h1>India's Trusted Bus Ticket Booking</h1>
      <p>Book bus tickets online easily and quickly</p>

      <!-- SEARCH BAR -->
      <div class="search-bar">
        <input type="text" placeholder="From">
        <input type="text" placeholder="To">
        <input type="date">
        <a th:href="@{/tickets/add}" class="search-btn">Search Buses</a>
      </div>

    </div>
  </div>
</section>

<!-- QUICK ACTIONS -->
<section class="quick-actions">

  <a th:href="@{/tickets/add}" class="action-card">
    <i class="fas fa-ticket-alt"></i>
    <h3>Book Ticket</h3>
  </a>

  <a th:href="@{/tickets}" class="action-card">
    <i class="fas fa-list"></i>
    <h3>View Tickets</h3>
  </a>

  <a th:href="@{/tickets/search}" class="action-card">
    <i class="fas fa-search"></i>
    <h3>Search Ticket</h3>
  </a>

  <a th:href="@{/tickets/cancel}" class="action-card">
    <i class="fas fa-times-circle"></i>
    <h3>Cancel Ticket</h3>
  </a>

</section>

<footer>
  <p>© 2026 Bus Ticket Booking System | Developed by Virendra</p>
</footer>

</body>
</html>
